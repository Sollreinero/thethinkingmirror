<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Thinking Mirror | Mike Barlow</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  color:white;
  background:linear-gradient(135deg,#5d5fbb,#7066c9,#231943);
}

main{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:60px 24px;
}

.wrap{
  max-width:1100px;
  width:100%;
  display:flex;
  align-items:center;
  gap:70px;
}

.cover{
  width:360px;
  max-width:100%;
  border-radius:8px;
  box-shadow:0 30px 70px rgba(0,0,0,.45);
}

.content{
  flex:1;
}

.headline{
  text-transform:uppercase;
  letter-spacing:.16em;
  font-size:14px;
  opacity:.9;
  margin-bottom:18px;
}

h1{
  font-family:Georgia,"Times New Roman",serif;
  font-size:72px;
  line-height:.92;
  margin:0 0 24px;
}

.new-book{
  font-size:24px;
  margin:0;
  opacity:.95;
}

.buttons{
  margin-top:40px;
}

a.button{
  display:inline-block;
  text-decoration:none;
  padding:14px 26px;
  border-radius:999px;
  margin:8px 8px 8px 0;
  font-size:16px;
}

.gold{
  background:#f2c94c;
  color:#231943;
  font-weight:bold;
}

.outline{
  color:white;
  border:1px solid rgba(255,255,255,.75);
}

.publisher{
  text-align:center;
  padding:0 24px 70px;
}

.publisher .label{
  text-transform:uppercase;
  letter-spacing:.16em;
  font-size:13px;
  opacity:.9;
  margin-bottom:18px;
}

.publisher img{
  width:450px;
  max-width:100%;
  opacity:1;
}

footer{
  text-align:center;
  padding:26px;
  border-top:1px solid rgba(255,255,255,.18);
  font-size:14px;
  opacity:.85;
}

@media(max-width:800px){
  .wrap{
    flex-direction:column;
    text-align:center;
    gap:40px;
  }

  h1{
    font-size:48px;
  }

  .new-book{
    font-size:20px;
  }

  a.button{
    display:block;
    width:280px;
    margin:12px auto;
  }
}
</style>
</head>

<body>

<main>
  <div class="wrap">
    <div>
      <img src="cover.jpg" alt="The Thinking Mirror book cover" class="cover">
    </div>

    <div class="content">
      <p class="headline">Human Perspectives on Artificial Intelligence</p>

      <h1>The Thinking Mirror</h1>

      <p class="new-book">A New Book by Mike Barlow</p>

      <div class="buttons">
        <a class="button gold" href="https://www.amazon.com/dp/B0H6T6QKY2" target="_blank">Buy The Thinking Mirror</a>
        <a class="button gold" href="https://thethinkingmirror.substack.com/">Visit The Thinking Mirror Substack</a>
        <a class="button gold" href="https://www.linkedin.com/in/authormikebarlow/">Contact Mike Barlow</a>
      </div>
    </div>
  </div>
</main>

<section class="publisher">
  <p class="label">Published by</p>
  <img src="letters.png" alt="University of Bridgeport Press">
</section>

<footer>
© Mike Barlow
</footer>

</body>
</html>
